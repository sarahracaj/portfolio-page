name: Update Strava Data

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update-strava:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Fetch Strava Data
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: |
          echo "Refreshing Strava token..."
          TOKEN_RESPONSE=$(curl -s -X POST https://www.strava.com/oauth/token \
            -F client_id="${STRAVA_CLIENT_ID}" \
            -F client_secret="${STRAVA_CLIENT_SECRET}" \
            -F refresh_token="${STRAVA_REFRESH_TOKEN}" \
            -F grant_type=refresh_token)
          
          echo "Token Response: $TOKEN_RESPONSE"
          
          ACCESS_TOKEN=$(echo $TOKEN_RESPONSE | jq -r '.access_token')
          
          if [ "$ACCESS_TOKEN" == "null" ] || [ -z "$ACCESS_TOKEN" ]; then
            echo "Error: Failed to get access token"
            echo "Full Response: $TOKEN_RESPONSE"
            exit 1
          fi
          
          echo "Token refreshed successfully"
          
          echo "Fetching activities..."
          # Fetch all activities needed for the calendar (last 12+ months)
          # Strava API max per_page is 200, we'll fetch multiple pages if needed
          ALL_ACTIVITIES="[]"
          PAGE=1
          PER_PAGE=200
          
          while true; do
            ACTIVITIES=$(curl -s -H "Authorization: Bearer $ACCESS_TOKEN" \
              "https://www.strava.com/api/v3/athlete/activities?per_page=${PER_PAGE}&page=${PAGE}")
            
            # Check if we got any activities
            ACTIVITY_COUNT=$(echo "$ACTIVITIES" | jq '. | length')
            
            if [ "$ACTIVITY_COUNT" -eq 0 ]; then
              break
            fi
            
            # Merge with existing activities
            ALL_ACTIVITIES=$(echo "$ALL_ACTIVITIES $ACTIVITIES" | jq -s 'add')
            
            # If we got less than per_page, we've reached the end
            if [ "$ACTIVITY_COUNT" -lt "$PER_PAGE" ]; then
              break
            fi
            
            PAGE=$((PAGE + 1))
            
            # Safety limit: fetch max 10 pages (2000 activities - covers ~5 years of data)
            if [ "$PAGE" -gt 10 ]; then
              break
            fi
          done
          
          echo "Total activities fetched: $(echo "$ALL_ACTIVITIES" | jq '. | length')"
          echo "Total activities fetched: $(echo "$ALL_ACTIVITIES" | jq '. | length')"
          echo "Activities Response (first 200 chars): ${ALL_ACTIVITIES:0:200}"
          
          echo "{\"activities\": $ALL_ACTIVITIES, \"updated_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > strava-data.json
          
          echo "Activities fetched successfully"
      
      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add strava-data.json
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🏃 Update Strava activities - $(date '+%Y-%m-%d %H:%M:%S')"
            git push
            echo "Changes pushed successfully"
          fi